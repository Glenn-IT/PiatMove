<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:0;background:var(--surface-card);font-family:var(--font-body);}
  .grid{display:flex;}
  .cell{flex:1;padding:26px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;border-right:1px solid var(--border-subtle);}
  .cell:last-child{border:none;}
  .onblue{background:var(--gradient-hero);}
  .t{font:var(--fw-medium) 11px/1 var(--font-body);color:var(--text-muted);}
  .tw{color:rgba(255,255,255,.8);}
</style></head><body>
<div class="grid">
  <div class="cell"><img src="../assets/logo-mark.svg" width="72" height="72" alt="mark"/><div class="t">App icon / mark</div></div>
  <div class="cell"><img src="../assets/logo-full.svg" width="220" alt="wordmark"/><div class="t">Primary lockup</div></div>
  <div class="cell onblue"><img src="../assets/logo-white.svg" width="220" alt="reversed"/><div class="t tw">Reversed on blue</div></div>
</div>
</body></html>

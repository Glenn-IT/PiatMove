<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base grid — space-1 → space-16" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-body);}
  .row{display:flex;align-items:flex-end;gap:14px;}
  .col{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .bar{background:var(--blue-500);border-radius:3px;width:26px;}
  .v{font:var(--fw-semibold) 11px/1 var(--font-body);color:var(--text-strong);}
  .t{font:var(--fw-regular) 10px/1 var(--font-body);color:var(--text-muted);}
</style></head><body>
<div class="row" id="r"></div>
<script>
  const s=[['1',4],['2',8],['3',12],['4',16],['5',20],['6',24],['8',32],['10',40],['12',48],['16',64]];
  document.getElementById('r').innerHTML=s.map(([k,v])=>`<div class="col"><div class="bar" style="height:${v}px"></div><div class="v">${v}</div><div class="t">space-${k}</div></div>`).join('');
</script>
</body></html>

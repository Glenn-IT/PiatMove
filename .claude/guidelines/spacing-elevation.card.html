<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation" subtitle="Soft layered shadows — xs to lg + nav" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:28px 22px;background:var(--surface-app);font-family:var(--font-body);display:flex;gap:24px;align-items:center;flex-wrap:wrap;}
  .col{display:flex;flex-direction:column;align-items:center;gap:12px;}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-md);}
  .t{font:var(--fw-medium) 11px/1 var(--font-body);color:var(--text-muted);}
</style></head><body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t">shadow-xs</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">shadow-sm · cards</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">shadow-md · hover</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">shadow-lg · sheets</div></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-focus)"></div><div class="t">shadow-focus · ring</div></div>
</body></html>

<!-- @dsCard group="Colors" viewport="700x190" name="Primary — Blue" subtitle="Government blue scale · primary = blue-600" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-body);}
  .scale{display:flex;gap:0;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);}
  .sw{flex:1;height:88px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font:var(--fw-semibold) 10px/1.3 var(--font-body);}
  .meta{display:flex;justify-content:space-between;margin-top:12px;}
  .meta b{font:var(--fw-bold) 13px/1 var(--font-display);color:var(--text-strong);}
  .meta small{font:var(--fw-regular) 12px/1 var(--font-body);color:var(--text-muted);}
</style></head><body>
<div class="scale" id="s"></div>
<div class="meta"><b>Primary &nbsp;·&nbsp; blue-600 #2454E0</b><small>Trust · headers · primary actions · links</small></div>
<script>
  const steps=[[50,'#EFF5FF'],[100,'#DBE7FE'],[200,'#BFD3FE'],[300,'#93B4FD'],[400,'#6090FA'],[500,'#3B6DF4'],[600,'#2454E0'],[700,'#1D43B8'],[800,'#1D3C94'],[900,'#1B3576']];
  document.getElementById('s').innerHTML=steps.map(([k,v])=>`<div class="sw" style="background:${v};color:${k>=300?'#fff':'#1B3576'}"><span>${k}<br>${v}</span></div>`).join('');
</script>
</body></html>

<!-- @dsCard group="Colors" viewport="700x190" name="Secondary — Green" subtitle="Service green scale · secondary = green-500" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-body);}
  .scale{display:flex;border-radius:var(--radius-md);overflow:hidden;box-shadow:var(--shadow-xs);}
  .sw{flex:1;height:88px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font:var(--fw-semibold) 10px/1.3 var(--font-body);}
  .meta{display:flex;justify-content:space-between;margin-top:12px;}
  .meta b{font:var(--fw-bold) 13px/1 var(--font-display);color:var(--text-strong);}
  .meta small{font:var(--fw-regular) 12px/1 var(--font-body);color:var(--text-muted);}
</style></head><body>
<div class="scale" id="s"></div>
<div class="meta"><b>Secondary &nbsp;·&nbsp; green-500 #12B76A</b><small>Success · confirmations · "go" states · approvals</small></div>
<script>
  const steps=[[50,'#ECFDF3'],[100,'#D1FADF'],[200,'#A6F4C5'],[300,'#6CE9A6'],[400,'#32D583'],[500,'#12B76A'],[600,'#039855'],[700,'#027A48'],[800,'#05603A'],[900,'#054F31']];
  document.getElementById('s').innerHTML=steps.map(([k,v])=>`<div class="sw" style="background:${v};color:${k>=300?'#fff':'#054F31'}"><span>${k}<br>${v}</span></div>`).join('');
</script>
</body></html>

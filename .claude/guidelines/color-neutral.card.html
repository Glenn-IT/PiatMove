<!-- @dsCard group="Colors" viewport="700x190" name="Neutral — Slate" subtitle="Backgrounds, cards, text & borders" -->
<!DOCTYPE html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../styles.css"/>
<style>
  body{margin:0;padding:22px;background:var(--surface-card);font-family:var(--font-body);}
  .scale{display:flex;border:1px solid var(--border-subtle);border-radius:var(--radius-md);overflow:hidden;}
  .sw{flex:1;height:88px;display:flex;align-items:flex-end;padding:8px;}
  .sw span{font:var(--fw-semibold) 10px/1.3 var(--font-body);}
  .meta{display:flex;justify-content:space-between;margin-top:12px;}
  .meta b{font:var(--fw-bold) 13px/1 var(--font-display);color:var(--text-strong);}
  .meta small{font:var(--fw-regular) 12px/1 var(--font-body);color:var(--text-muted);}
</style></head><body>
<div class="scale" id="s"></div>
<div class="meta"><b>Neutral · Slate</b><small>app bg = gray-50 · cards = white · body = gray-700 · borders = gray-200</small></div>
<script>
  const steps=[['0','#FFFFFF'],[50,'#F8FAFC'],[100,'#F1F5F9'],[200,'#E7EDF3'],[300,'#CBD5E1'],[400,'#94A3B8'],[500,'#64748B'],[600,'#475569'],[700,'#334155'],[800,'#1E293B'],[900,'#0F172A']];
  document.getElementById('s').innerHTML=steps.map(([k,v])=>`<div class="sw" style="background:${v};color:${k>=400||k==='900'?'#fff':'#334155'}"><span>${k}<br>${v}</span></div>`).join('');
</script>
</body></html>

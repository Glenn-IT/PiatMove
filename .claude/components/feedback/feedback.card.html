<!-- @dsCard group="Components" viewport="700x400" name="Feedback — Timeline & List rows" subtitle="Booking status tracker and list items" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-app); }
  .lbl { font: var(--fw-bold) 11px/1 var(--font-body); letter-spacing: .08em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 12px; }
  .sec { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 20px; }
  .wrap { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }
  .tile { width: 40px; height: 40px; border-radius: var(--radius-sm); display: inline-flex; align-items: center; justify-content: center; flex: none; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { StatusTimeline, ListItem, Badge } = window.PiatBookingDesignSystem_2c1fe9;
const Tile = ({name, bg, fg}) => <span className="tile" style={{background:bg, color:fg}}><Icon name={name} size={20}/></span>;
function Demo() {
  return (
    <div className="wrap">
      <div className="sec" style={{flex:1, minWidth:280}}>
        <div className="lbl">Status Timeline</div>
        <StatusTimeline steps={[
          { label:"Booking Approved", time:"Today · 8:02 AM", state:"done" },
          { label:"Driver Assigned — Jose Cruz", time:"8:10 AM", state:"done" },
          { label:"In Transit to Tuguegarao", time:"Now", state:"active" },
          { label:"Trip Completed", state:"pending" },
        ]} />
      </div>
      <div className="sec" style={{flex:1, minWidth:280}}>
        <div className="lbl">List Items</div>
        <ListItem leading={<Tile name="check-circle" bg="var(--green-50)" fg="var(--green-600)"/>} title="Booking Approved" subtitle="Trip BK-2041 to Tuguegarao confirmed" meta="2m" />
        <ListItem leading={<Tile name="user" bg="var(--blue-50)" fg="var(--blue-600)"/>} title="Driver Assigned" subtitle="Jose Cruz · Toyota HiAce" meta="1h" />
        <ListItem leading={<Tile name="flag" bg="var(--amber-50)" fg="var(--amber-700)"/>} title="Trip Completed" subtitle="Rate your experience" meta="Yesterday" trailing={<Icon name="chevron-right" size={18} color="var(--text-subtle)"/>} divider={false} />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>

<!-- @dsCard group="Components" viewport="700x360" name="Navigation — TopBar & BottomNav" subtitle="App header and mobile bottom tab bar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-app); }
  .lbl { font: var(--fw-bold) 11px/1 var(--font-body); letter-spacing: .08em; text-transform: uppercase; color: var(--text-subtle); margin-bottom: 10px; }
  .phone { width: 300px; border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); background: var(--surface-card); }
  .brandbar { background: var(--gradient-hero); }
  .wrap { display: flex; gap: 28px; flex-wrap: wrap; align-items: flex-start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../assets/icons.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { TopBar, BottomNav, IconButton, Avatar } = window.PiatBookingDesignSystem_2c1fe9;
function Demo() {
  const [tab, setTab] = React.useState("home");
  const items = [
    { key:"home", label:"Home", icon:<Icon name="home" size={22}/> },
    { key:"bookings", label:"Bookings", icon:<Icon name="ticket" size={22}/>, badge:2 },
    { key:"book", label:"Book", icon:<Icon name="plus" size={22}/> },
    { key:"alerts", label:"Alerts", icon:<Icon name="bell" size={22}/> },
    { key:"profile", label:"Profile", icon:<Icon name="user" size={22}/> },
  ];
  return (
    <div className="wrap">
      <div>
        <div className="lbl">TopBar — default</div>
        <div className="phone">
          <TopBar title="Book Vehicle" subtitle="Step 1 of 2"
            leading={<IconButton label="Back"><Icon name="arrow-left" size={20}/></IconButton>}
            trailing={<IconButton label="Help"><Icon name="info" size={20}/></IconButton>} />
          <div style={{height:60}}></div>
        </div>
        <div className="lbl" style={{marginTop:18}}>TopBar — brand</div>
        <div className="phone">
          <div className="brandbar">
            <TopBar variant="brand" title="Good morning, Maria" subtitle="Where are you headed?"
              leading={<Avatar name="Maria Santos" size={40} />}
              trailing={<IconButton variant="ghost" label="Alerts" style={{color:'#fff'}}><Icon name="bell" size={20} color="#fff"/></IconButton>} />
            <div style={{height:24}}></div>
          </div>
        </div>
      </div>
      <div>
        <div className="lbl">BottomNav (active: {tab})</div>
        <div className="phone">
          <div style={{height:120, display:"flex", alignItems:"center", justifyContent:"center", color:"var(--text-subtle)", font:"var(--fw-medium) 13px/1 var(--font-body)"}}>Tap a tab below</div>
          <BottomNav items={items} activeKey={tab} onChange={setTab} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo/>);
</script>
</body>
</html>
